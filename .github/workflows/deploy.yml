name: Deploy to cPanel

# Automatikus feltöltés a cPanel tárhelyre, valahányszor a main ág frissül
# (pl. egy PR merge-elésekor). Kézzel is indítható az Actions fülről.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cpanel
  cancel-in-progress: true

jobs:
  deploy:
    # A deploy csak akkor fut, ha bekapcsoltad: állítsd be a DEPLOY_ENABLED
    # repository variable-t "true"-ra (Settings → Secrets and variables → Actions
    # → Variables). Amíg nincs bekapcsolva, ez a lépés kihagyódik (nem lesz piros hiba).
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Kód kicsekkolása
        uses: actions/checkout@v4

      # A Passenger újraindításához: friss időbélyeg a tmp/restart.txt-be.
      # A cPanel a fájl módosításakor újraindítja a Node alkalmazást.
      - name: Passenger restart trigger
        run: |
          mkdir -p tmp
          date -u +"%Y-%m-%dT%H:%M:%SZ restart" > tmp/restart.txt

      - name: Feltöltés FTP-vel a cPanelre
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ vars.FTP_PORT || 21 }}
          protocol: ${{ vars.FTP_PROTOCOL || 'ftps' }}
          # Az alkalmazás gyökere a tárhelyen (FTP-felhasználó home-jához képest),
          # pl. "dornsite/" vagy "public_html/dornsite/". Perjellel a végén!
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Ezeket NE töltse fel / NE törölje a szerveren:
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            data/**
            uploads/**
            **/.env
            **/*.md
            .env.example
